<style>
    #splashScreen {
        height: 100%;
        position: absolute;
        width: 100%;
        top: 0;
        z-index: 2000000;
        background: #EBFFFF;
        background: linear-gradient(135deg, #8a4e44 0%, #d7895f 50%, #ddba96 100%);
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: "Open Sans";
    }



    #splashScreen svg {
        max-height: 500px;
        height: 100vh;
        width: 100vw;
        max-width: 500px;
        overflow: visible;
        filter: drop-shadow(0 0 30px rgba(119, 59, 49, 0.6)) drop-shadow(0 0 60px rgba(138, 78, 68, 0.4));
    }


    #splashScreen {
        display: flex;
        justify-content: center;
        align-items: start;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
    }

    #cow-head {
        transform-origin: center;
        transform-box: fill-box;
        animation: cow-head-spin 10s ease-in-out infinite;
    }

    @keyframes cow-head-spin {
        0% {
            transform: scale(0) rotate(-360deg);
        }
        10% {
            transform: scale(1) rotate(0deg);
        }
        20% {
            transform: scale(1) rotate(-5deg);
        }
        30% {
            transform: scale(1) rotate(5deg);
        }
        40% {
            transform: scale(1) rotate(-5deg);
        }
        50% {
            transform: scale(1) rotate(5deg);
        }
        60% {
            transform: scale(1) rotate(-5deg);
        }
        70% {
            transform: scale(1) rotate(5deg);
        }
        80% {
            transform: scale(1) rotate(0deg);
        }
        100% {
            transform: scale(0) rotate(360deg);
        }
    }

    #oil-well-top {
        transform-origin: 45% 54%;
        transform-box: fill-box;
        animation: oil-well-sway 3s ease-in-out infinite;
    }

    @keyframes oil-well-sway {
        0%, 100% {
            transform: rotate(-5deg);
        }
        50% {
            transform: rotate(10deg);
        }
    }

</style>
