<style>
    #container {
        width: 100%;
        height: 100%;
    }

    /* ── Firework animation ── */

    /* ── Rocket launch ── */
    .rocket {
        animation: launch 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes launch {
        0%        { transform: translateY(0);      opacity: 1; }
        36%       { transform: translateY(-375px); opacity: 0; }
        37%, 100% { transform: translateY(0);      opacity: 0; }
    }

    /* ── Burst wrapper ── */
    .burst {
        animation: burst-gate 3s infinite;
        opacity: 0;
    }
    @keyframes burst-gate {
        0%,  36%  { opacity: 0; }
        37%, 78%  { opacity: 1; }
        79%, 100% { opacity: 0; }
    }

    /* ── Central flash ── */
    .flash-outer {
        transform-origin: 340px 160px;
        animation: flash-out 3s infinite;
        opacity: 0;
    }
    .flash-inner {
        transform-origin: 340px 160px;
        animation: flash-in 3s infinite;
        opacity: 0;
    }
    @keyframes flash-out {
        0%,  36%  { transform: scale(0);   opacity: 0; }
        38%       { transform: scale(1);   opacity: 0.95; }
        48%       { transform: scale(1.4); opacity: 0; }
        100%      { transform: scale(1.4); opacity: 0; }
    }
    @keyframes flash-in {
        0%,  36%  { transform: scale(0);   opacity: 0; }
        38%       { transform: scale(1);   opacity: 1; }
        45%       { transform: scale(1.2); opacity: 0; }
        100%      { transform: scale(1.2); opacity: 0; }
    }

    /* ── Spark expand: draw from center outward ── */
    .spark-draw {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: spark-expand 3s infinite;
    }
    @keyframes spark-expand {
        0%,  36%  { stroke-dashoffset: 120; opacity: 1; }
        37%       { stroke-dashoffset: 120; opacity: 1; }
        50%       { stroke-dashoffset: 0;   opacity: 1; }
        78%       { stroke-dashoffset: 0;   opacity: 0; }
        79%, 100% { stroke-dashoffset: 120; opacity: 0; }
    }

    /* ── Glimmers ── */
    .glimmer {
        transform-origin: 340px 160px;
        animation: glimmer-fly 3s infinite;
        opacity: 0;
    }
    @keyframes glimmer-fly {
        0%,  37%  { transform: scale(0); opacity: 0;    }
        39%       { transform: scale(0); opacity: 0.85; }
        58%       { transform: scale(1); opacity: 0.6;  }
        68%       { transform: scale(1); opacity: 0;    }
        100%      { transform: scale(1); opacity: 0;    }
    }
    .glimmer:nth-child(odd)  { animation-delay: 0.03s; }
    .glimmer:nth-child(even) { animation-delay: 0.06s; }

    /* ── Stagger the four fireworks evenly across the 3s cycle ──
       Every animated part of a firework must share the same delay so the
       rocket, burst, sparks and glimmers stay in sync within that firework. */
    #firework-2 .rocket, #firework-2 .burst, #firework-2 .flash-outer, #firework-2 .flash-inner, #firework-2 .spark-draw, #firework-2 .glimmer { animation-delay: 0.75s; }
    #firework-3 .rocket, #firework-3 .burst, #firework-3 .flash-outer, #firework-3 .flash-inner, #firework-3 .spark-draw, #firework-3 .glimmer { animation-delay: 1.5s; }
    #firework-4 .rocket, #firework-4 .burst, #firework-4 .flash-outer, #firework-4 .flash-inner, #firework-4 .spark-draw, #firework-4 .glimmer { animation-delay: 2.25s; }
</style>
