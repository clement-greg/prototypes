<style>
    #splashScreen {
        height: 100%;
        position: absolute;
        width: 100%;
        top: 0;
        z-index: 2000000;
        background: #EBFFFF;
        background: linear-gradient(0deg, #26945f 0%, #16f78b 100%);
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: "Open Sans";
    }



    #splashScreen svg {
        max-height: 500px;
        height: 100vh;
        width: 100vw;
        max-width: 500px;
        overflow: visible;
        filter: drop-shadow(0 0 30px rgba(235, 232, 52, 0.6)) drop-shadow(0 0 60px rgba(235, 232, 52, 0.4));
    }


    #splashScreen {
        display: flex;
        justify-content: center;
        align-items: start;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
    }

    @keyframes beam-rotate {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    #sun-beams {
        transform-origin: center;
        transform-box: fill-box;
        animation: beam-rotate 40s linear infinite;
    }

    /* Tree grow/shrink animation */
    #main-tree-structure {
        transform-origin: bottom center;
        transform-box: fill-box;
        animation: tree-grow 12s ease-in-out infinite;
    }

    @keyframes sun-throb {
        0% {
            transform: scale(1);
            filter: drop-shadow(0 0 30px rgba(255, 255, 0, 0.6)) drop-shadow(0 0 60px rgba(255, 255, 0, 0.4));
        }

        50% {
            transform: scale(.9);
            filter: drop-shadow(0 0 40px rgba(255, 255, 0, 0.8)) drop-shadow(0 0 80px rgba(255, 255, 0, 0.6));
        }

        100% {
            transform: scale(1);
            filter: drop-shadow(0 0 30px rgba(255, 255, 0, 0.6)) drop-shadow(0 0 60px rgba(255, 255, 0, 0.4));
        }
    }

    #sun {
        animation: sun-throb 12s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
    }

    @keyframes tree-grow {
        0% {
            transform: scaleY(0);
        }

        /* Tree fully grown */
        5% {
            transform: scaleY(1);
        }

        /* Hold steady */
        90% {
            transform: scaleY(1);
        }

        /* Tree shrinks back */
        94% {
            transform: scaleY(0);
        }

        100% {
            transform: scaleY(0);
        }
    }

    /* Leaves animation */
    [id^="tree-leaf-"] {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
        animation: leaf-fade 12s ease-in-out infinite;
    }

    @keyframes leaf-fade {
        0% {
            opacity: 0;
        }

        /* Wait for tree to grow */
        12.5% {
            opacity: 0;
        }

        /* Leaves fade in */
        25% {
            opacity: 1;
        }

        /* Hold steady */
        67% {
            opacity: 1;
        }

        /* Leaves fade out */
        79% {
            opacity: 0;
        }

        100% {
            opacity: 0;
        }
    }

    /* Stagger the leaf animations */
    #tree-leaf-1 {
        animation-delay: 0s;
    }

    #tree-leaf-2 {
        animation-delay: 0.05s;
    }

    #tree-leaf-3 {
        animation-delay: 0.1s;
    }

    #tree-leaf-4 {
        animation-delay: 0.15s;
    }

    #tree-leaf-5 {
        animation-delay: 0.2s;
    }

    #tree-leaf-6 {
        animation-delay: 0.25s;
    }

    #tree-leaf-7 {
        animation-delay: 0.3s;
    }

    #tree-leaf-8 {
        animation-delay: 0.35s;
    }

    #tree-leaf-9 {
        animation-delay: 0.4s;
    }

    #tree-leaf-10 {
        animation-delay: 0.45s;
    }

    #tree-leaf-11 {
        animation-delay: 0.5s;
    }

    #tree-leaf-12 {
        animation-delay: 0.55s;
    }

    #tree-leaf-13 {
        animation-delay: 0.6s;
    }

    #tree-leaf-14 {
        animation-delay: 0.65s;
    }

    #tree-leaf-15 {
        animation-delay: 0.7s;
    }

    #tree-leaf-16 {
        animation-delay: 0.75s;
    }

    #tree-leaf-17 {
        animation-delay: 0.8s;
    }

    #tree-leaf-18 {
        animation-delay: 0.85s;
    }

    #tree-leaf-19 {
        animation-delay: 0.9s;
    }

    #tree-leaf-20 {
        animation-delay: 0.95s;
    }

    #tree-leaf-21 {
        animation-delay: 1s;
    }

    #tree-leaf-22 {
        animation-delay: 1.05s;
    }

    #tree-leaf-23 {
        animation-delay: 1.1s;
    }

    #tree-leaf-24 {
        animation-delay: 1.15s;
    }

    #tree-leaf-25 {
        animation-delay: 1.2s;
    }

    #tree-leaf-26 {
        animation-delay: 1.25s;
    }

    #tree-leaf-27 {
        animation-delay: 1.3s;
    }

    /* Free leaves blowing in the wind */
    #free-leaf-1 {
        transform-origin: center;
        transform-box: fill-box;
        animation: wind-blow-1 8s linear infinite;
    }

    #free-leaf-2 {
        transform-origin: center;
        transform-box: fill-box;
        animation: wind-blow-2 10s linear infinite;
        animation-delay: -2s;
    }

    #free-leaf-3 {
        transform-origin: center;
        transform-box: fill-box;
        animation: wind-blow-3 7s linear infinite;
        animation-delay: -4s;
    }

    #free-leaf-4 {
        transform-origin: center;
        transform-box: fill-box;
        animation: wind-blow-4 9s linear infinite;
        animation-delay: -1s;
    }

    @keyframes wind-blow-1 {
        0% {
            transform: translateX(-800px) translateY(0) rotate(0deg);
            opacity: 0;
        }

        5% {
            opacity: 1;
        }

        15% {
            transform: translateX(-500px) translateY(-60px) rotate(45deg);
        }

        30% {
            transform: translateX(-200px) translateY(30px) rotate(120deg);
        }

        45% {
            transform: translateX(100px) translateY(-40px) rotate(200deg);
        }

        60% {
            transform: translateX(400px) translateY(50px) rotate(280deg);
        }

        75% {
            transform: translateX(900px) translateY(-20px) rotate(360deg);
        }

        90% {
            opacity: 1;
        }

        100% {
            transform: translateX(1400px) translateY(40px) rotate(450deg);

        }
    }

    @keyframes wind-blow-2 {
        0% {
            transform: translateX(-900px) translateY(100px) rotate(0deg);

        }

        5% {
            opacity: 1;
        }

        20% {
            transform: translateX(-550px) translateY(20px) rotate(-60deg);
        }

        35% {
            transform: translateX(-250px) translateY(120px) rotate(-140deg);
        }

        50% {
            transform: translateX(50px) translateY(40px) rotate(-220deg);
        }

        65% {
            transform: translateX(350px) translateY(130px) rotate(-300deg);
        }

        80% {
            transform: translateX(950px) translateY(60px) rotate(-380deg);
        }

        90% {
            opacity: 1;
        }

        100% {
            transform: translateX(1350px) translateY(110px) rotate(-480deg);

        }
    }

    @keyframes wind-blow-3 {
        0% {
            transform: translateX(-700px) translateY(-50px) rotate(30deg);

        }

        8% {
            opacity: 1;
        }

        18% {
            transform: translateX(-400px) translateY(-120px) rotate(90deg);
        }

        33% {
            transform: translateX(-100px) translateY(-30px) rotate(170deg);
        }

        48% {
            transform: translateX(200px) translateY(-100px) rotate(250deg);
        }

        63% {
            transform: translateX(500px) translateY(-20px) rotate(340deg);
        }

        78% {
            transform: translateX(900px) translateY(-80px) rotate(420deg);
        }

        88% {
            opacity: 1;
        }

        100% {
            transform: translateX(1300px) translateY(-40px) rotate(520deg);

        }
    }

    @keyframes wind-blow-4 {
        0% {
            transform: translateX(-850px) translateY(200px) rotate(-20deg);

        }

        6% {
            opacity: 1;
        }

        16% {
            transform: translateX(-520px) translateY(140px) rotate(50deg);
        }

        32% {
            transform: translateX(-180px) translateY(220px) rotate(130deg);
        }

        48% {
            transform: translateX(160px) translateY(160px) rotate(210deg);
        }

        64% {
            transform: translateX(500px) translateY(240px) rotate(290deg);
        }

        80% {
            transform: translateX(940px) translateY(180px) rotate(370deg);
        }

        90% {
            opacity: 1;
        }

        100% {
            transform: translateX(1400px) translateY(200px) rotate(460deg);

        }
    }
</style>
