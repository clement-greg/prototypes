    /* ===== Confetti ===== */
    /*
     * Three-layer approach so CSS transforms work in SVG user-space at any scale:
     *   1. Outer <g transform="translate(X,0)"> — SVG-native X position (always SVG user units)
     *   2. .cf — CSS fall animation; transform-box:view-box makes % values = % of SVG viewBox size
     *   3. .cf-spin — rotation around piece centre (transform-box:fill-box)
     *   4. .cf-shape — scaleX flutter/ripple (transform-box:fill-box)
     */
    .cf {
        transform-box: view-box;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
    }
    .cf-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation-name: cf-spin-cw;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }
    .cf-spin-ccw { animation-name: cf-spin-ccw; }
    .cf-shape {
        transform-box: fill-box;
        transform-origin: center;
        animation-name: cf-twist;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
    }
    @keyframes cf-spin-cw  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
    @keyframes cf-spin-ccw { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
    @keyframes cf-twist {
        0%, 100% { transform: scaleX(1)    scaleY(1);    }
        25%      { transform: scaleX(0.07) scaleY(1.15); }
        50%      { transform: scaleX(-1)   scaleY(1);    }
        75%      { transform: scaleX(0.07) scaleY(1.15); }
    }
