<style>
    #splashScreen {
        height: 100%;
        position: absolute;
        width: 100%;
        top: 0;
        z-index: 2000000;
        background: #EBFFFF;
        background: linear-gradient(0deg, #89b8d9 0%, #2f5875 100%);
    }

    h1,
    h2,
    h3,
    h4 {
        font-family: "Open Sans";
    }



    #splashScreen svg {
        max-height: 800px;
        height: 100vh;
        width: 100vw;
        max-width: 800px;
        overflow: visible;
        filter: drop-shadow(0 0 30px rgba(177, 203, 222, 0.6)) drop-shadow(0 0 60px rgba(177, 203, 222, 0.4));
    }


    #splashScreen {
        display: flex;
        justify-content: center;
        align-items: start;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
    }

    #basket-ball {
        animation: ball-bounce 1.25s cubic-bezier(0.25, 0, 0.75, 1) infinite;
        transform-origin: bottom;
        transform-box: fill-box;
    }

    @keyframes ball-bounce {
        0% {
            transform: translateY(0) scaleY(1) scaleX(1);
        }

        /* Extended hang time at top */
        25% {
            transform: translateY(5px) scaleY(1) scaleX(1);
        }

        /* Accelerating fall with slight vertical stretch */
        35% {
            transform: translateY(120px) scaleY(1.08) scaleX(0.95);
        }

        45% {
            transform: translateY(300px) scaleY(1.12) scaleX(0.92);
        }

        /* Impact - squash wide and flat */
        50% {
            transform: translateY(350px) scaleY(0.55) scaleX(1.25);
        }

        /* Bounce up with stretch */
        55% {
            transform: translateY(300px) scaleY(1.12) scaleX(0.92);
        }

        65% {
            transform: translateY(120px) scaleY(1.08) scaleX(0.95);
        }

        /* Extended hang time at top */
        75% {
            transform: translateY(5px) scaleY(1) scaleX(1);
        }

        /* Return to rest */
        100% {
            transform: translateY(0) scaleY(1) scaleX(1);
        }
    }


    @keyframes ball-rotate {
        0% {
            transform: rotate(0deg);
        }
        50% {
            transform: rotate(60deg);
        }

        100% {
            transform: rotate(0deg);
        }
    }
    

    #basket-ball-inner {
        transform-origin: center;
        transform-box: fill-box;
        /* animation: ball-rotate 1s ease-in-out infinite; */
    }

    #star-1,
    #star-2,
    #star-3,
    #star-4 {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
    }

    #star-1 {
        animation: star1-float 2.5s ease-in-out infinite;
    }

    #star-2 {
        animation: star2-float 2.5s ease-in-out infinite;
        animation-delay: 0.5s;
    }

    #star-3 {
        animation: star3-float 2.5s ease-in-out infinite;
        animation-delay: 1s;
    }

    #star-4 {
        animation: star4-float 2.5s ease-in-out infinite;
        animation-delay: 1.5s;
    }

    @keyframes star1-float {
        0% {
            opacity: 0;
            transform: translateY(0) rotate(0deg);
        }

        20% {
            opacity: 1;
        }

        80% {
            opacity: 1;
        }

        100% {
            opacity: 0;
            transform: translateY(-100px) rotate(15deg);
        }
    }

    @keyframes star2-float {
        0% {
            opacity: 0;
            transform: translateY(0) rotate(0deg);
        }

        20% {
            opacity: 1;
        }

        80% {
            opacity: 1;
        }

        100% {
            opacity: 0;
            transform: translateY(-100px) rotate(-12deg);
        }
    }

    @keyframes star3-float {
        0% {
            opacity: 0;
            transform: translateY(0) rotate(0deg);
        }

        20% {
            opacity: 1;
        }

        80% {
            opacity: 1;
        }

        100% {
            opacity: 0;
            transform: translateY(-100px) rotate(18deg);
        }
    }

    @keyframes star4-float {
        0% {
            opacity: 0;
            transform: translateY(0) rotate(0deg);
        }

        20% {
            opacity: 1;
        }

        80% {
            opacity: 1;
        }

        100% {
            opacity: 0;
            transform: translateY(-100px) rotate(-8deg);
        }
    }

    @keyframes net {
        0% {
            transform: scaleY(1);
        }

        25% {
            transform: scaleY(1);
        }

        40% {
            transform: scaleY(1.2);
        }

        50% {
            transform: scaleY(1);
        }

        60% {
            transform: scaleY(1);
        }

        70% {
            transform: scaleY(0.8);
        }

        80% {
            transform: scaleY(1);
        }

        100% {
            transform: scaleY(1);
        }
    }

    #net {
        transform-origin: top;
        transform-box: fill-box;
        animation: net 1.25s ease-in-out infinite;
    }

    #march-madness-banner {
        transform-origin: center;
        transform-box: fill-box;
        animation: banner-spin 9s ease-in-out infinite;
    }

    @keyframes banner-spin {
        0% {
            transform: rotate(0deg) scale(0);
            opacity: 0;
        }

        8% {
            transform: rotate(720deg) scale(1);
            opacity: 1;
        }

        66% {
            transform: rotate(720deg) scale(1);
            opacity: 1;
        }

        78% {
            transform: rotate(1440deg) scale(0);
            opacity: 0;
        }

        100% {
            transform: rotate(1440deg) scale(0);
            opacity: 0;
        }
    }
</style>
